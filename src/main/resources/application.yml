server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

spring:
  application:
    name: payment-gateway
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/paygateway}
    username: ${DB_USERNAME:paygateway}
    password: ${DB_PASSWORD:paygateway}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  thymeleaf:
    cache: false

# ---- Application specific config (bound via @ConfigurationProperties) ----
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_dummy}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_dummy}
  base-url: ${STRIPE_BASE_URL:https://api.stripe.com}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_dummy}
  key-secret: ${RAZORPAY_KEY_SECRET:rzp_secret_dummy}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:rzp_whsec_dummy}

jwt:
  secret: ${JWT_SECRET:change-me-to-a-very-long-random-secret-value-at-least-64-bytes-long-0123456789}
  access-token-expiry: ${JWT_ACCESS_EXPIRY:900000}
  refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}

gateway:
  fee-percentage: 2.0
  fee-flat: 0.30
  checkout:
    session-ttl-minutes: 30
  idempotency:
    ttl-hours: 24
  webhook:
    max-attempts: 5
    base-url: ${WEBHOOK_BASE_URL:http://localhost:8080}

# ---- Resilience4j ----
resilience4j:
  circuitbreaker:
    instances:
      stripe:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        automatic-transition-from-open-to-half-open-enabled: true
      razorpay:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        automatic-transition-from-open-to-half-open-enabled: true

# ---- Observability ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: payment-gateway
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.paygateway: INFO
    org.springframework.web: WARN
